<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Camp Day 3 — 오늘의 여정</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: #a78bfa;
    margin-bottom: 6px;
    text-align: center;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #64748b;
    margin-bottom: 28px;
    text-align: center;
  }

  .stage-nav {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stage-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid #334155;
    background: transparent;
    color: #94a3b8;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .stage-btn:hover {
    border-color: #a78bfa;
    color: #a78bfa;
  }

  .stage-btn.active {
    background: #a78bfa;
    border-color: #a78bfa;
    color: #0f1117;
  }

  .canvas-wrap {
    position: relative;
    width: 1100px;
    max-width: 100%;
    height: 560px;
    background: #161b27;
    border-radius: 16px;
    border: 1.5px solid #1e293b;
    overflow: hidden;
  }

  svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  .node {
    transition: opacity 0.5s;
  }

  .node-claude rect {
    fill: #1e293b;
    stroke: #a78bfa;
    stroke-width: 2.5;
  }

  .node-tool rect {
    fill: #0f2420;
    stroke: #34d399;
    stroke-width: 1.5;
  }

  .node-mcp rect {
    fill: #1a1a2e;
    stroke: #f472b6;
    stroke-width: 1.5;
  }

  .node-skill rect {
    fill: #1e1a0e;
    stroke: #fbbf24;
    stroke-width: 1.5;
  }

  .node-agent rect {
    fill: #0f1e2e;
    stroke: #60a5fa;
    stroke-width: 1.5;
  }

  .node-task rect {
    fill: #0f1a0a;
    stroke: #a3e635;
    stroke-width: 1.5;
  }

  .node-merge rect {
    fill: #1e293b;
    stroke: #a78bfa;
    stroke-width: 1.5;
    stroke-dasharray: 4 2;
  }

  .node-analyze rect {
    fill: #1e1a0e;
    stroke: #fbbf24;
    stroke-width: 1.5;
  }

  .node-generate rect {
    fill: #0f2420;
    stroke: #34d399;
    stroke-width: 1.5;
  }

  .node-label {
    font-size: 11px;
    font-weight: 600;
    text-anchor: middle;
    dominant-baseline: middle;
    fill: #e2e8f0;
    pointer-events: none;
  }

  .node-sublabel {
    font-size: 9px;
    text-anchor: middle;
    dominant-baseline: middle;
    fill: #64748b;
    pointer-events: none;
  }

  .arrow {
    transition: opacity 0.5s;
    fill: none;
    stroke-width: 1.8;
  }

  .arrow-main        { stroke: #a78bfa; }
  .arrow-tool        { stroke: #34d399; stroke-dasharray: 4 3; }
  .arrow-mcp         { stroke: #f472b6; stroke-dasharray: 4 3; }
  .arrow-skill       { stroke: #fbbf24; }
  .arrow-agent       { stroke: #60a5fa; }
  .arrow-orch        { stroke: #a78bfa; stroke-width: 2.2; }
  .arrow-task        { stroke: #a3e635; stroke-dasharray: 3 2; stroke-width: 1.5; }
  .arrow-wf-analyze  { stroke: #fbbf24; stroke-width: 2.0; }
  .arrow-wf-generate { stroke: #34d399; stroke-width: 2.2; }
  .arrow-wf-entry    { stroke: #fb923c; stroke-width: 2.2; }

  .stage-label {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.76rem;
    color: #475569;
    background: #0f1117;
    padding: 4px 12px;
    border-radius: 12px;
    border: 1px solid #1e293b;
    white-space: nowrap;
    pointer-events: none;
  }

  .message-bar {
    margin-top: 20px;
    padding: 12px 24px;
    background: linear-gradient(135deg, #1e1a2e, #1a1a2e);
    border: 1.5px solid #4c1d95;
    border-radius: 12px;
    font-size: 0.88rem;
    color: #c4b5fd;
    text-align: center;
    max-width: 1100px;
    width: 100%;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .progress-bar {
    display: flex;
    gap: 6px;
    margin-top: 16px;
    align-items: center;
  }

  .progress-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #334155;
    transition: background 0.3s;
  }

  .progress-dot.done    { background: #a78bfa; }
  .progress-dot.current { background: #a78bfa; box-shadow: 0 0 6px #a78bfa; }

  .nav-btns {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }

  .nav-btn {
    padding: 8px 22px;
    border-radius: 8px;
    border: 1.5px solid #334155;
    background: transparent;
    color: #94a3b8;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-btn:hover:not(:disabled) { border-color: #a78bfa; color: #a78bfa; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .nav-btn.primary {
    background: #a78bfa;
    border-color: #a78bfa;
    color: #0f1117;
  }

  .nav-btn.primary:hover:not(:disabled) {
    background: #8b5cf6;
    border-color: #8b5cf6;
    color: #fff;
  }
</style>
</head>
<body>

<h1>Day 3: Agent와 병렬 작업 — 나만의 AI 팀 만들기</h1>
<p class="subtitle">Skill은 레시피, Agent는 셰프, Task는 주문 전표</p>

<div class="stage-nav" id="stageNav"></div>

<div class="canvas-wrap">
  <svg id="diagram" viewBox="0 0 1100 560" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Arrow markers -->
      <marker id="ah-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#a78bfa"/>
      </marker>
      <marker id="ah-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#34d399"/>
      </marker>
      <marker id="ah-pink" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#f472b6"/>
      </marker>
      <marker id="ah-yellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#fbbf24"/>
      </marker>
      <marker id="ah-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#fb923c"/>
      </marker>
      <marker id="ah-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#60a5fa"/>
      </marker>
      <marker id="ah-lime" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#a3e635"/>
      </marker>

      <!-- Glow filters -->
      <filter id="glow-purple">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-orange">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-blue">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <!-- Dot grid pattern for Stage 3 container -->
      <pattern id="dotGridPurple" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
        <circle cx="8" cy="8" r="1" fill="#a78bfa" opacity="0.35"/>
      </pattern>
    </defs>

    <!-- ══════════════════════════════════
         PERSON (always visible, cx=70 cy=280)
    ══════════════════════════════════ -->
    <g id="nodePerson">
      <circle cx="70" cy="280" r="22" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
      <text x="70" y="285" text-anchor="middle" font-size="22">🧑</text>
      <text x="70" y="313" class="node-label" fill="#38bdf8">사용자</text>
    </g>

    <!-- ══════════════════════════════════
         CLAUDE CODE (always visible, x=220 y=255 w=130 h=54)
    ══════════════════════════════════ -->
    <g id="nodeClaude" class="node node-claude" filter="url(#glow-purple)">
      <rect x="220" y="255" width="130" height="54" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2.5"/>
      <text x="285" y="277" class="node-label" fill="#a78bfa" font-size="13">Claude Code</text>
      <text x="285" y="295" class="node-sublabel">AI 에이전트</text>
    </g>

    <!-- ══════════════════════════════════
         STAGE 0: CONCEPT NODES
    ══════════════════════════════════ -->

    <!-- Fog layer (fades out in stage 0 to reveal concept nodes) -->
    <g id="fogConceptNodes" style="transition:opacity 0.6s">
      <rect x="430" y="160" width="160" height="270" rx="8" fill="#0f1117"/>
      <text x="510" y="300" text-anchor="middle" font-size="36">❓</text>
    </g>

    <g id="nodeConceptSkill" class="node" opacity="0">
      <rect x="450" y="180" width="110" height="50" rx="8" fill="#1e1a0e" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="505" y="200" class="node-label" fill="#fbbf24">Skill</text>
      <text x="505" y="216" class="node-sublabel">레시피</text>
    </g>
    <g id="nodeConceptAgent" class="node" opacity="0">
      <rect x="450" y="270" width="110" height="50" rx="8" fill="#0f1e2e" stroke="#60a5fa" stroke-width="1.5"/>
      <text x="505" y="290" class="node-label" fill="#60a5fa">Agent</text>
      <text x="505" y="306" class="node-sublabel">셰프</text>
    </g>
    <g id="nodeConceptTask" class="node" opacity="0">
      <rect x="450" y="360" width="110" height="50" rx="8" fill="#0f1a0a" stroke="#a3e635" stroke-width="1.5"/>
      <text x="505" y="380" class="node-label" fill="#a3e635">Task</text>
      <text x="505" y="396" class="node-sublabel">주문 전표</text>
    </g>

    <!-- ══════════════════════════════════
         STAGE 1: SINGLE AGENT
    ══════════════════════════════════ -->

    <!-- Fog covering stage 1 area -->
    <g id="fogStage1" style="transition:opacity 0.4s" opacity="1">
      <rect x="375" y="200" width="520" height="200" fill="#161b27"/>
    </g>

    <g id="nodeSkill1" class="node node-skill" opacity="0">
      <rect x="390" y="255" width="118" height="54" rx="8"/>
      <text x="449" y="277" class="node-label" fill="#fbbf24" font-size="10">/channel-faq</text>
      <text x="449" y="293" class="node-sublabel">Skill</text>
    </g>

    <g id="nodeAgent1" class="node node-agent" opacity="0" filter="url(#glow-blue)">
      <rect x="570" y="255" width="110" height="54" rx="10"/>
      <text x="625" y="274" class="node-label" fill="#60a5fa" font-size="10">🤖 Agent</text>
      <text x="625" y="290" class="node-sublabel">채널 분석</text>
    </g>

    <g id="nodeMcpSlack1" class="node node-mcp" opacity="0">
      <rect x="760" y="220" width="100" height="36" rx="6"/>
      <text x="810" y="238" class="node-label" fill="#f472b6" font-size="10">Slack MCP</text>
    </g>

    <g id="nodeToolRead1" class="node node-tool" opacity="0">
      <rect x="760" y="270" width="100" height="36" rx="6"/>
      <text x="810" y="288" class="node-label" fill="#34d399">Read</text>
    </g>

    <g id="nodeTaskDone" class="node node-task" opacity="0">
      <rect x="760" y="320" width="100" height="36" rx="6"/>
      <text x="810" y="333" class="node-label" fill="#a3e635" font-size="10">Task ✅</text>
      <text x="810" y="348" class="node-sublabel">완료 추적</text>
    </g>

    <!-- ══════════════════════════════════
         STAGE 2: PARALLEL AGENTS
    ══════════════════════════════════ -->

    <!-- Fog covering stage 2 area -->
    <g id="fogStage2" style="transition:opacity 0.4s" opacity="1">
      <rect x="355" y="120" width="660" height="320" fill="#161b27"/>
    </g>

    <g id="nodeSkill2" class="node node-skill" opacity="0">
      <rect x="370" y="255" width="118" height="54" rx="8"/>
      <text x="429" y="277" class="node-label" fill="#fbbf24" font-size="10">/channel-faq</text>
      <text x="429" y="293" class="node-sublabel">Skill</text>
    </g>

    <!-- Parallel bracket indicator -->
    <g id="parallelBracket" class="node" opacity="0">
      <text x="508" y="155" text-anchor="middle" font-size="8" fill="#60a5fa" opacity="0.6">|| parallel</text>
      <line x1="505" y1="160" x2="505" y2="400" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
      <line x1="505" y1="160" x2="512" y2="160" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
      <line x1="505" y1="280" x2="512" y2="280" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
      <line x1="505" y1="400" x2="512" y2="400" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
    </g>

    <g id="nodeAgent2a" class="node node-agent" opacity="0" filter="url(#glow-blue)">
      <rect x="520" y="160" width="110" height="48" rx="10"/>
      <text x="575" y="179" class="node-label" fill="#60a5fa" font-size="10">🤖 Agent A</text>
      <text x="575" y="195" class="node-sublabel">dev-support</text>
    </g>
    <g id="nodeAgent2b" class="node node-agent" opacity="0" filter="url(#glow-blue)">
      <rect x="520" y="256" width="110" height="48" rx="10"/>
      <text x="575" y="275" class="node-label" fill="#60a5fa" font-size="10">🤖 Agent B</text>
      <text x="575" y="291" class="node-sublabel">product-qa</text>
    </g>
    <g id="nodeAgent2c" class="node node-agent" opacity="0" filter="url(#glow-blue)">
      <rect x="520" y="352" width="110" height="48" rx="10"/>
      <text x="575" y="371" class="node-label" fill="#60a5fa" font-size="10">🤖 Agent C</text>
      <text x="575" y="387" class="node-sublabel">infra-help</text>
    </g>

    <g id="nodeMcp2a" class="node node-mcp" opacity="0">
      <rect x="710" y="168" width="90" height="32" rx="6"/>
      <text x="755" y="184" class="node-label" fill="#f472b6" font-size="9.5">Slack MCP</text>
    </g>
    <g id="nodeMcp2b" class="node node-mcp" opacity="0">
      <rect x="710" y="264" width="90" height="32" rx="6"/>
      <text x="755" y="280" class="node-label" fill="#f472b6" font-size="9.5">Slack MCP</text>
    </g>
    <g id="nodeMcp2c" class="node node-mcp" opacity="0">
      <rect x="710" y="360" width="90" height="32" rx="6"/>
      <text x="755" y="376" class="node-label" fill="#f472b6" font-size="9.5">Slack MCP</text>
    </g>

    <g id="nodeMerge2" class="node node-merge" opacity="0">
      <rect x="870" y="240" width="110" height="80" rx="10"/>
      <text x="925" y="273" class="node-label" fill="#a78bfa">결과 수집</text>
      <text x="925" y="289" class="node-sublabel">merged Q&amp;A</text>
    </g>

    <!-- ══════════════════════════════════
         STAGE 3: WORKFLOW (DAG)
    ══════════════════════════════════ -->

    <!-- Fog covering stage 3 area (starts at x=355 to avoid covering Claude node) -->
    <g id="fogStage3" style="transition:opacity 0.4s" opacity="1">
      <rect x="355" y="55" width="735" height="450" fill="#161b27"/>
    </g>

    <!-- Outer container -->
    <g id="orchContainer3" class="node" opacity="0">
      <rect x="220" y="60" width="860" height="440" rx="14"
            fill="#130f1a" stroke="#a78bfa" stroke-width="2" stroke-dasharray="8 4"/>
      <rect x="220" y="60" width="860" height="440" rx="14"
            fill="url(#dotGridPurple)" opacity="0.4"/>
      <!-- Header strip -->
      <rect x="220" y="60" width="860" height="28" rx="14" fill="#a78bfa" fill-opacity="0.12"/>
      <rect x="220" y="74" width="860" height="14" fill="#a78bfa" fill-opacity="0.12"/>
      <!-- Traffic light dots -->
      <circle cx="238" cy="74" r="5" fill="#a78bfa" opacity="0.9"/>
      <circle cx="254" cy="74" r="5" fill="#60a5fa" opacity="0.7"/>
      <circle cx="270" cy="74" r="5" fill="#34d399" opacity="0.5"/>
      <!-- Container title -->
      <text x="290" y="79" class="node-label" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="start">/channel-faq</text>

      <!-- Phase labels -->
      <text x="340" y="100" text-anchor="middle" font-size="8" font-weight="700" fill="#60a5fa" opacity="0.7" letter-spacing="0.5">COLLECT (parallel)</text>
      <text x="650" y="100" text-anchor="middle" font-size="8" font-weight="700" fill="#fbbf24" opacity="0.7" letter-spacing="0.5">ANALYZE (sequential)</text>
      <text x="910" y="100" text-anchor="middle" font-size="8" font-weight="700" fill="#34d399" opacity="0.7" letter-spacing="0.5">GENERATE (sequential)</text>

      <!-- Phase dividers -->
      <line x1="510" y1="105" x2="510" y2="490" stroke="#334155" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
      <line x1="780" y1="105" x2="780" y2="490" stroke="#334155" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
    </g>

    <!-- Collect phase agents -->
    <g id="nodeWf2a" class="node node-agent" opacity="0" filter="url(#glow-blue)">
      <rect x="280" y="150" width="110" height="46" rx="10"/>
      <text x="335" y="169" class="node-label" fill="#60a5fa" font-size="10">🤖 Agent A</text>
      <text x="335" y="185" class="node-sublabel">dev-support</text>
    </g>
    <g id="nodeWf2b" class="node node-agent" opacity="0" filter="url(#glow-blue)">
      <rect x="280" y="240" width="110" height="46" rx="10"/>
      <text x="335" y="259" class="node-label" fill="#60a5fa" font-size="10">🤖 Agent B</text>
      <text x="335" y="275" class="node-sublabel">product-qa</text>
    </g>
    <g id="nodeWf2c" class="node node-agent" opacity="0" filter="url(#glow-blue)">
      <rect x="280" y="330" width="110" height="46" rx="10"/>
      <text x="335" y="349" class="node-label" fill="#60a5fa" font-size="10">🤖 Agent C</text>
      <text x="335" y="365" class="node-sublabel">infra-help</text>
    </g>

    <!-- Analyze phase agent -->
    <g id="nodeWfAnalyze" class="node node-analyze" opacity="0">
      <rect x="595" y="230" width="110" height="60" rx="10"/>
      <text x="650" y="254" class="node-label" fill="#fbbf24">Agent</text>
      <text x="650" y="270" class="node-sublabel">Pattern Analysis</text>
    </g>

    <!-- Generate phase agent -->
    <g id="nodeWfGenerate" class="node node-generate" opacity="0">
      <rect x="855" y="230" width="110" height="60" rx="10"/>
      <text x="910" y="254" class="node-label" fill="#34d399">Agent</text>
      <text x="910" y="270" class="node-sublabel">FAQ Doc Writer</text>
    </g>

    <!-- MCP/Tool nodes inside container -->
    <g id="nodeWfMcpA" class="node node-mcp" opacity="0">
      <rect x="280" y="420" width="90" height="32" rx="6"/>
      <text x="325" y="436" class="node-label" fill="#f472b6" font-size="9.5">Slack MCP</text>
    </g>
    <g id="nodeWfMcpB" class="node node-mcp" opacity="0">
      <rect x="380" y="420" width="90" height="32" rx="6"/>
      <text x="425" y="436" class="node-label" fill="#f472b6" font-size="9.5">Slack MCP</text>
    </g>
    <g id="nodeWfMcpC" class="node node-mcp" opacity="0">
      <rect x="480" y="420" width="90" height="32" rx="6"/>
      <text x="525" y="436" class="node-label" fill="#f472b6" font-size="9.5">Slack MCP</text>
    </g>
    <g id="nodeWfWrite" class="node node-tool" opacity="0">
      <rect x="855" y="420" width="110" height="32" rx="6"/>
      <text x="910" y="436" class="node-label" fill="#34d399">Write (md)</text>
    </g>

    <!-- ══════════════════════════════════
         ARROWS
    ══════════════════════════════════ -->

    <!-- Person ↔ Claude (always visible) -->
    <path id="arrPersonClaude" class="arrow arrow-main"
          d="M 93 274 L 218 274" marker-end="url(#ah-purple)"/>
    <path id="arrClaudePerson" class="arrow arrow-main"
          d="M 220 264 L 94 264" marker-end="url(#ah-purple)"/>

    <!-- Stage 1 arrows -->
    <path id="arrClaudeSkill1" class="arrow arrow-skill" opacity="0"
          d="M 350 282 L 388 282" marker-end="url(#ah-yellow)"/>
    <path id="arrSkill1Agent1" class="arrow arrow-agent" opacity="0"

          d="M 680 282 L 758 288" marker-end="url(#ah-green)"/>
    <path id="arrAgent1Task" class="arrow arrow-task" opacity="0"

    <!-- Stage 2 arrows -->
    <path id="arrClaudeSkill2" class="arrow arrow-skill" opacity="0"

    <path id="arrSkill2AgentA" class="arrow arrow-agent" opacity="0"

    <path id="arrSkill2AgentB" class="arrow arrow-agent" opacity="0"

    <path id="arrSkill2AgentC" class="arrow arrow-agent" opacity="0"

    <path id="arrAgent2aMcp" class="arrow arrow-mcp" opacity="0"

    <path id="arrAgent2bMcp" class="arrow arrow-mcp" opacity="0"
          d="M 630 280 L 708 280" marker-end="url(#ah-pink)"/>
    <path id="arrAgent2cMcp" class="arrow arrow-mcp" opacity="0"
          d="M 630 376 L 708 376" marker-end="url(#ah-pink)"/>
    <path id="arrAgent2aMerge" class="arrow arrow-main" opacity="0"
          stroke-dasharray="4 3"
          d="M 630 190 C 750 220 820 250 868 265" marker-end="url(#ah-purple)"/>
    <path id="arrAgent2bMerge" class="arrow arrow-main" opacity="0"
          stroke-dasharray="4 3"
          d="M 630 280 L 868 280" marker-end="url(#ah-purple)"/>
    <path id="arrAgent2cMerge" class="arrow arrow-main" opacity="0"

    <!-- Stage 3 arrows -->

    <!-- Fan-out: dispatch point to each collect agent -->
    <path id="arrWfEntryA" class="arrow arrow-agent" opacity="0"

    <path id="arrWfEntryB" class="arrow arrow-agent" opacity="0"
          d="M 350 272 C 365 268 378 265 390 263" marker-end="url(#ah-blue)"/>
    <path id="arrWfEntryC" class="arrow arrow-agent" opacity="0"
          d="M 285 309 C 285 330 330 345 390 353" marker-end="url(#ah-blue)"/>

    <!-- Agents → MCP nodes (downward) -->
    <path id="arrWfAMcp" class="arrow arrow-mcp" opacity="0"
          d="M 310 196 L 315 418" marker-end="url(#ah-pink)"/>
    <path id="arrWfBMcp" class="arrow arrow-mcp" opacity="0"
          d="M 340 286 C 365 360 405 400 420 418" marker-end="url(#ah-pink)"/>
    <path id="arrWfCMcp" class="arrow arrow-mcp" opacity="0"
          d="M 370 376 C 450 405 490 415 515 418" marker-end="url(#ah-pink)"/>

    <!-- Collect → Analyze (fan-in) -->
    <path id="arrWfAAnalyze" class="arrow arrow-wf-analyze" opacity="0"
          d="M 390 173 C 490 200 550 230 593 250" marker-end="url(#ah-yellow)"/>
    <path id="arrWfBAnalyze" class="arrow arrow-wf-analyze" opacity="0"
          d="M 390 263 C 490 260 550 258 593 258" marker-end="url(#ah-yellow)"/>
    <path id="arrWfCAnalyze" class="arrow arrow-wf-analyze" opacity="0"
          d="M 390 353 C 490 320 550 285 593 268" marker-end="url(#ah-yellow)"/>

    <!-- Analyze → Generate (sequential) -->
    <path id="arrWfAnalyzeGenerate" class="arrow arrow-wf-generate" opacity="0"

  <div class="stage-label" id="stageLabel"></div>

<div class="message-bar" id="messageBar"></div>

<div class="progress-bar" id="progressBar"></div>

<div class="nav-btns">
  <button class="nav-btn" id="btnPrev">← 이전</button>
  <button class="nav-btn primary" id="btnNext">다음 →</button>
</div>

<script>
// All togglable node IDs
const allNodes = [
  // Stage 0 concept
  "nodeConceptSkill","nodeConceptAgent","nodeConceptTask",
  // Stage 1
  "nodeSkill1","nodeAgent1","nodeMcpSlack1","nodeToolRead1","nodeTaskDone",
  // Stage 2
  "nodeSkill2","parallelBracket","nodeAgent2a","nodeAgent2b","nodeAgent2c",
  "nodeMcp2a","nodeMcp2b","nodeMcp2c","nodeMerge2",
  // Stage 3
  "orchContainer3","nodeWf2a","nodeWf2b","nodeWf2c",
  "nodeWfAnalyze","nodeWfGenerate",
  "nodeWfMcpA","nodeWfMcpB","nodeWfMcpC","nodeWfWrite",
];

// All togglable arrow IDs
const allArrows = [
  // Stage 1
  "arrClaudeSkill1","arrSkill1Agent1","arrAgent1Slack","arrAgent1Read","arrAgent1Task",
  // Stage 2
  "arrClaudeSkill2","arrSkill2AgentA","arrSkill2AgentB","arrSkill2AgentC",
  "arrAgent2aMcp","arrAgent2bMcp","arrAgent2cMcp",
  "arrAgent2aMerge","arrAgent2bMerge","arrAgent2cMerge",
  // Stage 3
  "arrWfClaudeEntry","arrWfEntryA","arrWfEntryB","arrWfEntryC",
  "arrWfAMcp","arrWfBMcp","arrWfCMcp",
  "arrWfAAnalyze","arrWfBAnalyze","arrWfCAnalyze",
  "arrWfAnalyzeGenerate","arrWfGenerateWrite",
];

const stages = [
  // ── 0. Concept ──
  {
    title: "0. 개념: Skill / Agent / Task",
    message: "Skill은 레시피, Agent는 셰프, Task는 주문 전표 — 세 개념의 차이를 먼저 이해합니다.",
    fog: {
      fogConceptNodes: 0,
      fogStage1: 1,
      fogStage2: 1,
      fogStage3: 1,
    },
    show: ["nodeConceptSkill","nodeConceptAgent","nodeConceptTask"],
    showArrows: [],
  },
  // ── 1. Single Agent ──
  {
    title: "1. Agent 하나 호출",
    message: "/channel-faq Skill이 Agent를 호출합니다. Agent는 Slack MCP로 채널을 읽고, 결과를 Claude에게 돌려줍니다.",
    fog: {
      fogConceptNodes: 1,
      fogStage1: 0,
      fogStage2: 1,
      fogStage3: 1,
    },
    show: ["nodeSkill1","nodeAgent1","nodeMcpSlack1","nodeToolRead1","nodeTaskDone"],
    showArrows: ["arrClaudeSkill1","arrSkill1Agent1","arrAgent1Slack","arrAgent1Read","arrAgent1Task"],
  },
  // ── 2. Parallel Agents ──
  {
    title: "2. 여러 Agent 동시 실행",
    message: "여러 채널을 동시에 분석합니다. Agent들이 병렬로 실행되어 각자 독립적으로 Slack MCP에 접근합니다 — 하나씩 기다리는 것보다 훨씬 빠릅니다!",
    fog: {
      fogConceptNodes: 1,
      fogStage1: 1,
      fogStage2: 0,
      fogStage3: 1,
    },
    show: ["nodeSkill2","parallelBracket","nodeAgent2a","nodeAgent2b","nodeAgent2c","nodeMcp2a","nodeMcp2b","nodeMcp2c","nodeMerge2"],
    showArrows: ["arrClaudeSkill2","arrSkill2AgentA","arrSkill2AgentB","arrSkill2AgentC","arrAgent2aMcp","arrAgent2bMcp","arrAgent2cMcp","arrAgent2aMerge","arrAgent2bMerge","arrAgent2cMerge"],
  },
  // ── 3. Workflow (DAG) ──
  {
    title: "3. 수집 → 분석 → 생성 파이프라인",
    message: "Task Topology: 수집은 병렬로, 분석과 생성은 순차로 — 의존성 그래프(DAG)가 최적 실행 순서를 결정합니다.",
    fog: {
      fogConceptNodes: 1,
      fogStage1: 1,
      fogStage2: 1,
      fogStage3: 0,
    },
    show: ["orchContainer3","nodeWf2a","nodeWf2b","nodeWf2c","nodeWfAnalyze","nodeWfGenerate","nodeWfMcpA","nodeWfMcpB","nodeWfMcpC","nodeWfWrite"],
    showArrows: ["arrWfClaudeEntry","arrWfEntryA","arrWfEntryB","arrWfEntryC","arrWfAMcp","arrWfBMcp","arrWfCMcp","arrWfAAnalyze","arrWfBAnalyze","arrWfCAnalyze","arrWfAnalyzeGenerate","arrWfGenerateWrite"],
  },
];

let current = 0;

function applyStage(idx) {
  const s = stages[idx];

  document.getElementById("stageLabel").textContent = s.title;
  document.getElementById("messageBar").textContent = s.message;

  // Fog layers
  for (const [id, opacity] of Object.entries(s.fog)) {
    const el = document.getElementById(id);
    if (el) el.style.opacity = opacity;
  }

  // Nodes
  allNodes.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.opacity = s.show.includes(id) ? "1" : "0";
  });

  // Arrows
  allArrows.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.opacity = s.showArrows.includes(id) ? "1" : "0";
  });

  // Stage nav buttons
  document.querySelectorAll(".stage-btn").forEach((btn, i) => {
    btn.classList.toggle("active", i === idx);
  });

  // Progress dots
  document.querySelectorAll(".progress-dot").forEach((dot, i) => {
    dot.classList.remove("done","current");
    if (i < idx) dot.classList.add("done");
    else if (i === idx) dot.classList.add("current");
  });

  document.getElementById("btnPrev").disabled = idx === 0;
  const isLast = idx === stages.length - 1;
  document.getElementById("btnNext").disabled = isLast;
  document.getElementById("btnNext").textContent = isLast ? "완료! 🎉" : "다음 →";
}

// Build stage nav buttons
const navLabels = ["0. Concept","1. Single Agent","2. Parallel Agents","3. Workflow (DAG)"];
const nav = document.getElementById("stageNav");
navLabels.forEach((label, i) => {
  const btn = document.createElement("button");
  btn.className = "stage-btn";
  btn.textContent = label;
  btn.addEventListener("click", () => { current = i; applyStage(i); });
  nav.appendChild(btn);
});

// Build progress dots
const pb = document.getElementById("progressBar");
stages.forEach(() => {
  const dot = document.createElement("div");
  dot.className = "progress-dot";
  pb.appendChild(dot);
});

// Navigation buttons
document.getElementById("btnPrev").addEventListener("click", () => {
  if (current > 0) { current--; applyStage(current); }
});
document.getElementById("btnNext").addEventListener("click", () => {
  if (current < stages.length - 1) { current++; applyStage(current); }
});

// Keyboard navigation
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === "ArrowDown") {
    if (current < stages.length - 1) { current++; applyStage(current); }
  } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
    if (current > 0) { current--; applyStage(current); }
  }
});

applyStage(0);
</script>
</body>
</html>
