<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Camp Day 3 — 오늘의 여정</title>
<style>
  :root {
    /* === Canvas & Background === */
    --bg-body:        #0a0e1a;
    --bg-canvas:      #111827;
    --bg-canvas-alt:  #0d1117;
    --border-canvas:  #1e2d45;

    /* === Brand / Orchestration (Purple) === */
    --color-purple:       #a78bfa;
    --color-purple-dim:   #7c3aed;
    --color-purple-bg:    #1e1b2e;
    --color-purple-glow:  rgba(167, 139, 250, 0.35);

    /* === Agent (Blue) === */
    --color-blue:       #60a5fa;
    --color-blue-dim:   #2563eb;
    --color-blue-bg:    #0f1e35;
    --color-blue-glow:  rgba(96, 165, 250, 0.30);

    /* === MCP (Pink) === */
    --color-pink:       #f472b6;
    --color-pink-bg:    #1e0f25;

    /* === Tool / Generate (Emerald) === */
    --color-green:      #34d399;
    --color-green-bg:   #0a2018;

    /* === Skill (Amber) === */
    --color-amber:      #fbbf24;
    --color-amber-bg:   #1e1708;

    /* === Task (Lime) === */
    --color-lime:       #86efac;
    --color-lime-bg:    #0a1f0e;

    /* === User node (Sky) === */
    --color-sky:        #38bdf8;

    /* === Text === */
    --text-primary:     #e2e8f0;
    --text-secondary:   #94a3b8;
    --text-muted:       #64748b;
    --text-dim:         #334155;

    /* === UI Chrome === */
    --border-default:   #1e293b;
    --border-active:    #334155;

    /* === Typography Scale === */
    --font-xs:    11px;
    --font-sm:    13px;
    --font-md:    15px;
    --font-lg:    18px;
    --font-xl:    22px;
    --font-h1:    2rem;

    /* === Spacing === */
    --space-xs:   8px;
    --space-sm:   12px;
    --space-md:   20px;
    --space-lg:   28px;
    --space-xl:   36px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-body);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
  }

  h1 {
    font-size: var(--font-h1);
    font-weight: 800;
    color: var(--color-purple);
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: -0.03em;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 1.05rem;
    color: var(--text-secondary);
    margin-bottom: var(--space-xl);
    text-align: center;
    font-weight: 500;
  }

  .stage-nav {
    display: flex;
    gap: var(--space-xs);
    margin-bottom: var(--space-lg);
    flex-wrap: wrap;
    justify-content: center;
  }

  .stage-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border-active);
    background: transparent;
    color: var(--text-secondary);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .stage-btn:hover {
    border-color: var(--color-purple);
    color: var(--color-purple);
    background: rgba(167, 139, 250, 0.06);
  }

  .stage-btn.active {
    background: var(--color-purple);
    border-color: var(--color-purple);
    color: var(--bg-body);
    box-shadow: 0 0 12px var(--color-purple-glow);
  }

  .canvas-wrap {
    position: relative;
    width: 1200px;
    max-width: 100%;
    height: 640px;
    background: var(--bg-canvas);
    border-radius: 20px;
    border: 1.5px solid var(--border-canvas);
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(167, 139, 250, 0.05);
  }

  svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  .node {
    transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s ease;
    cursor: default;
  }

  .node-claude rect {
    fill: #1c1f3a;
    stroke: var(--color-purple);
    stroke-width: 2.5;
  }

  .node-tool rect {
    fill: var(--color-green-bg);
    stroke: var(--color-green);
    stroke-width: 1.5;
  }

  .node-mcp rect {
    fill: var(--color-pink-bg);
    stroke: var(--color-pink);
    stroke-width: 1.5;
  }

  .node-skill rect {
    fill: #251e08;
    stroke: var(--color-amber);
    stroke-width: 1.5;
  }

  .node-agent rect {
    fill: #0d1e3d;
    stroke: var(--color-blue);
    stroke-width: 1.5;
  }

  .node-task rect {
    fill: var(--color-lime-bg);
    stroke: var(--color-lime);
    stroke-width: 1.5;
  }

  .node-merge rect {
    fill: #1c1f3a;
    stroke: var(--color-purple);
    stroke-width: 2.0;
    stroke-dasharray: 6 3;
  }

  .node-analyze rect {
    fill: #251e08;
    stroke: var(--color-amber);
    stroke-width: 1.5;
  }

  .node-generate rect {
    fill: var(--color-green-bg);
    stroke: var(--color-green);
    stroke-width: 1.5;
  }

  .node-label {
    font-size: 15px;
    font-weight: 700;
    text-anchor: middle;
    dominant-baseline: middle;
    fill: var(--text-primary);
    pointer-events: none;
  }

  .node-sublabel {
    font-size: 13px;
    text-anchor: middle;
    dominant-baseline: middle;
    fill: var(--text-secondary);
    pointer-events: none;
  }

  .arrow {
    transition: opacity 0.4s ease;
    fill: none;
    stroke-width: 2.5;
  }

  @keyframes dashFlow {
    to { stroke-dashoffset: -20; }
  }

  .arrow.animated {
    animation: dashFlow 1.2s linear infinite;
  }

  .arrow-main        { stroke: var(--color-purple); }
  .arrow-tool        { stroke: var(--color-green); stroke-dasharray: 6 4; }
  .arrow-mcp         { stroke: var(--color-pink); stroke-dasharray: 6 4; }
  .arrow-skill       { stroke: var(--color-amber); }
  .arrow-agent       { stroke: var(--color-blue); }
  .arrow-orch        { stroke: var(--color-purple); stroke-width: 2.8; }
  .arrow-task        { stroke: var(--color-lime); stroke-dasharray: 5 3; stroke-width: 2.2; }
  .arrow-wf-analyze  { stroke: var(--color-amber); stroke-width: 2.5; }
  .arrow-wf-generate { stroke: var(--color-green); stroke-width: 2.8; stroke-dasharray: 8 4; }
  .arrow-wf-entry    { stroke: #fb923c; stroke-width: 2.8; }

  .stage-label {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.9rem;
    font-weight: 600;
    color: #cbd5e1;
    background: rgba(10, 14, 26, 0.85);
    padding: 5px 14px;
    border-radius: 12px;
    border: 1px solid var(--border-default);
    white-space: nowrap;
    pointer-events: none;
    backdrop-filter: blur(4px);
  }

  .message-bar {
    margin-top: 24px;
    padding: 14px 28px;
    background: linear-gradient(135deg,
      rgba(30, 27, 46, 0.95) 0%,
      rgba(15, 20, 40, 0.95) 100%
    );
    border: 1.5px solid rgba(167, 139, 250, 0.35);
    border-radius: 14px;
    font-size: 1.05rem;
    font-weight: 500;
    color: #c4b5fd;
    text-align: center;
    max-width: 1200px;
    width: 100%;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.6;
    box-shadow:
      0 0 0 1px rgba(167, 139, 250, 0.1),
      0 8px 24px rgba(0, 0, 0, 0.4),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
  }

  .progress-bar {
    width: 100%;
    max-width: 400px;
    height: 4px;
    background: #334155;
    border-radius: 2px;
    position: relative;
    margin-top: 20px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--color-purple);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 8px var(--color-purple-glow);
  }

  .nav-btns {
    display: flex;
    gap: var(--space-sm);
    margin-top: 24px;
    margin-bottom: 32px;
    align-items: center;
  }

  .nav-btn {
    padding: 11px 28px;
    border-radius: 10px;
    border: 1.5px solid var(--border-active);
    background: transparent;
    color: var(--text-secondary);
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .nav-btn:hover:not(:disabled) {
    border-color: var(--color-purple);
    color: var(--color-purple);
    background: rgba(167, 139, 250, 0.08);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(167, 139, 250, 0.15);
  }

  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .nav-btn.primary {
    background: var(--color-purple);
    border-color: var(--color-purple);
    color: var(--bg-body);
    box-shadow: 0 0 16px var(--color-purple-glow);
  }

  .nav-btn.primary:hover:not(:disabled) {
    background: #8b5cf6;
    border-color: #8b5cf6;
    box-shadow: 0 0 24px rgba(139, 92, 246, 0.5);
    transform: translateY(-1px);
    color: #fff;
  }

  /* Progress bar dot indicators */
  .progress-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border-active);
    position: absolute;
    top: -3px;
    transform: translateX(-50%);
    transition: background 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }
  .progress-dot.reached {
    background: var(--color-purple-dim);
  }
  .progress-dot.active {
    background: var(--color-purple);
    box-shadow: 0 0 6px var(--color-purple-glow);
  }

  /* Fog fade transition */
  #fogConceptNodes {
    transition: opacity 0.4s ease;
  }

  /* Responsive */
  @media (max-width: 800px) {
    .canvas-wrap { height: 480px; }
    .message-bar { font-size: 0.9rem; padding: 10px 16px; }
    .nav-btn { padding: 9px 18px; font-size: 0.85rem; }
    body { padding: 16px 12px; }
  }
</style>
</head>
<body>

<h1>Day 3: Agent와 병렬 작업 — 나만의 AI 팀 만들기</h1>
<p class="subtitle">Skill은 레시피, Agent는 셰프, Task는 주문 전표</p>

<div class="stage-nav" id="stageNav"></div>

<div class="canvas-wrap">
  <svg id="diagram" viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Arrow markers — larger arrowheads -->
      <marker id="ah-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <polygon points="0 0,10 4,0 8" fill="#a78bfa"/>
      </marker>
      <marker id="ah-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <polygon points="0 0,10 4,0 8" fill="#34d399"/>
      </marker>
      <marker id="ah-pink" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <polygon points="0 0,10 4,0 8" fill="#f472b6"/>
      </marker>
      <marker id="ah-yellow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <polygon points="0 0,10 4,0 8" fill="#fbbf24"/>
      </marker>
      <marker id="ah-orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <polygon points="0 0,10 4,0 8" fill="#fb923c"/>
      </marker>
      <marker id="ah-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <polygon points="0 0,10 4,0 8" fill="#60a5fa"/>
      </marker>
      <marker id="ah-lime" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <polygon points="0 0,10 4,0 8" fill="#86efac"/>
      </marker>

      <!-- Enhanced glow filters -->
      <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
        <feColorMatrix in="blur" type="matrix"
          values="1 0 0 0 0.65
                  0 0 0 0 0.54
                  0 0 0 0 0.98
                  0 0 0 0.8 0" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <filter id="glow-orange" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
        <feColorMatrix in="blur" type="matrix"
          values="1 0 0 0 0.98
                  0 0 0 0 0.57
                  0 0 0 0 0.24
                  0 0 0 0.7 0" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
        <feColorMatrix in="blur" type="matrix"
          values="0 0 0 0 0.37
                  0 0 0 0 0.64
                  0 0 0 0 0.98
                  0 0 0 0.7 0" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <!-- Dot grid background -->
      <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
        <circle cx="10" cy="10" r="0.8" fill="#334155" opacity="0.4"/>
      </pattern>

      <!-- Dot grid pattern for Stage 3 container -->
      <pattern id="dotGridPurple" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
        <circle cx="8" cy="8" r="1" fill="#a78bfa" opacity="0.35"/>
      </pattern>

      <!-- Gradient for Stage 3 container header -->
      <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.25"/>
        <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.05"/>
      </linearGradient>

      <!-- Container border gradient -->
      <linearGradient id="containerBorderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.8"/>
        <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.8"/>
      </linearGradient>
    </defs>

    <!-- Canvas dot grid background -->
    <rect width="1200" height="640" fill="url(#dotGrid)" opacity="1"/>

    <!-- ══════════════════════════════════
         PERSON (always visible, cx=70 cy=300)
    ══════════════════════════════════ -->
    <g id="nodePerson">
      <circle cx="70" cy="300" r="26" fill="#0d1a28" stroke="#38bdf8" stroke-width="2.5"/>
      <!-- Head -->
      <circle cx="70" cy="290" r="9" fill="#38bdf8" fill-opacity="0.9"/>
      <!-- Body arc -->
      <path d="M52 320 Q70 305 88 320" fill="#38bdf8" fill-opacity="0.9"/>
      <text x="70" y="340" class="node-label" fill="#38bdf8" font-size="14">사용자</text>
    </g>

    <!-- ══════════════════════════════════
         STAGE 0: CONCEPT NODES
    ══════════════════════════════════ -->

    <!-- Fog layer (fades out in stage 0 to reveal concept nodes) -->
    <g id="fogConceptNodes" style="transition:opacity 0.6s">
      <rect x="430" y="160" width="160" height="300" rx="8" fill="#111827"/>
      <text x="510" y="315" text-anchor="middle" font-size="40">❓</text>
    </g>

    <g id="nodeConceptSkill" class="node" opacity="0">
      <title>Skill — 재사용 가능한 레시피. Claude가 특정 작업을 수행하는 방법을 정의합니다.</title>
      <rect x="450" y="185" width="120" height="54" rx="8" fill="#251e08" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="510" y="207" class="node-label" fill="#fbbf24">Skill</text>
      <text x="510" y="225" class="node-sublabel">레시피</text>
    </g>
    <g id="nodeConceptAgent" class="node" opacity="0">
      <title>Agent — 독립 실행 셰프. 도구와 MCP를 사용해 실제 작업을 수행합니다.</title>
      <rect x="450" y="283" width="120" height="54" rx="8" fill="#0d1e3d" stroke="#60a5fa" stroke-width="1.5"/>
      <text x="510" y="305" class="node-label" fill="#60a5fa">Agent</text>
      <text x="510" y="323" class="node-sublabel">셰프</text>
    </g>
    <g id="nodeConceptTask" class="node" opacity="0">
      <title>Task — 주문 전표. 작업의 상태(pending/in_progress/completed)를 추적합니다.</title>
      <rect x="450" y="381" width="120" height="54" rx="8" fill="#0a1f0e" stroke="#86efac" stroke-width="1.5"/>
      <text x="510" y="403" class="node-label" fill="#86efac">Task</text>
      <text x="510" y="421" class="node-sublabel">주문 전표</text>
    </g>

    <!-- ══════════════════════════════════
         STAGE 1: SINGLE AGENT
    ══════════════════════════════════ -->

    <g id="nodeSkill1" class="node node-skill" opacity="0">
      <rect x="390" y="273" width="118" height="58" rx="8"/>
      <text x="449" y="296" class="node-label" fill="#fbbf24" font-size="13">/channel-faq</text>
      <text x="449" y="315" class="node-sublabel">Skill</text>
    </g>

    <g id="nodeAgent1" class="node node-agent" opacity="0" filter="url(#glow-blue)">
      <title>Agent — Slack 채널 분석 에이전트. MCP를 통해 채널 메시지를 읽습니다.</title>
      <rect x="575" y="273" width="120" height="58" rx="12"/>
      <text x="635" y="294" class="node-label" fill="#60a5fa" font-size="13">🤖 Agent</text>
      <text x="635" y="314" class="node-sublabel">채널 분석</text>
    </g>

    <g id="nodeMcpSlack1" class="node node-mcp" opacity="0">
      <rect x="775" y="235" width="110" height="38" rx="8"/>
      <text x="830" y="254" class="node-label" fill="#f472b6" font-size="13">Slack MCP</text>
    </g>

    <g id="nodeToolRead1" class="node node-tool" opacity="0">
      <rect x="775" y="287" width="110" height="38" rx="8"/>
      <text x="830" y="306" class="node-label" fill="#34d399">Read</text>
    </g>

    <g id="nodeTaskDone" class="node node-task" opacity="0">
      <rect x="775" y="339" width="110" height="38" rx="8"/>
      <text x="830" y="353" class="node-label" fill="#86efac" font-size="13">Task ✅</text>
      <text x="830" y="370" class="node-sublabel">완료 추적</text>
    </g>

    <!-- ══════════════════════════════════
         STAGE 2: PARALLEL AGENTS
    ══════════════════════════════════ -->

    <g id="nodeSkill2" class="node node-skill" opacity="0">
      <rect x="370" y="273" width="118" height="58" rx="8"/>
      <text x="429" y="296" class="node-label" fill="#fbbf24" font-size="13">/channel-faq</text>
      <text x="429" y="315" class="node-sublabel">Skill</text>
    </g>

    <!-- Parallel bracket indicator -->
    <g id="parallelBracket" class="node" opacity="0">
      <text x="515" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#60a5fa" opacity="0.85" letter-spacing="1">‖ parallel</text>
      <line x1="512" y1="155" x2="512" y2="420" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
      <line x1="512" y1="155" x2="520" y2="155" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
      <line x1="512" y1="302" x2="520" y2="302" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
      <line x1="512" y1="420" x2="520" y2="420" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
    </g>

    <g id="nodeAgent2a" class="node node-agent" opacity="0" filter="url(#glow-blue)">
      <rect x="528" y="165" width="120" height="52" rx="12"/>
      <text x="588" y="186" class="node-label" fill="#60a5fa" font-size="13">🤖 Agent A</text>
      <text x="588" y="205" class="node-sublabel">dev-support</text>
    </g>
    <g id="nodeAgent2b" class="node node-agent" opacity="0" filter="url(#glow-blue)">
      <rect x="528" y="276" width="120" height="52" rx="12"/>
      <text x="588" y="297" class="node-label" fill="#60a5fa" font-size="13">🤖 Agent B</text>
      <text x="588" y="316" class="node-sublabel">product-qa</text>
    </g>
    <g id="nodeAgent2c" class="node node-agent" opacity="0" filter="url(#glow-blue)">
      <rect x="528" y="387" width="120" height="52" rx="12"/>
      <text x="588" y="408" class="node-label" fill="#60a5fa" font-size="13">🤖 Agent C</text>
      <text x="588" y="427" class="node-sublabel">infra-help</text>
    </g>

    <g id="nodeMcp2a" class="node node-mcp" opacity="0">
      <rect x="725" y="174" width="100" height="35" rx="8"/>

<script>
// All togglable node IDs
const allNodes = [
  // Stage 0 concept
  "nodeConceptSkill","nodeConceptAgent","nodeConceptTask",
  // Stage 1
  "nodeSkill1","nodeAgent1","nodeMcpSlack1","nodeToolRead1","nodeTaskDone",
  // Stage 2
  "nodeSkill2","parallelBracket","nodeAgent2a","nodeAgent2b","nodeAgent2c",
  "nodeMcp2a","nodeMcp2b","nodeMcp2c","nodeMerge2",
  // Stage 3
  "orchContainer3","nodeWf2a","nodeWf2b","nodeWf2c",
  "nodeWfAnalyze","nodeWfGenerate",
  "nodeWfMcpA","nodeWfMcpB","nodeWfMcpC","nodeWfWrite",
];

// All togglable arrow IDs
const allArrows = [
  // Stage 1
  "arrClaudeSkill1","arrSkill1Agent1","arrAgent1Slack","arrAgent1Read","arrAgent1Task",
  // Stage 2
  "arrClaudeSkill2","arrSkill2AgentA","arrSkill2AgentB","arrSkill2AgentC",
  "arrAgent2aMcp","arrAgent2bMcp","arrAgent2cMcp",
  "arrAgent2aMerge","arrAgent2bMerge","arrAgent2cMerge",
  // Stage 3
  "arrWfClaudeEntry","arrWfEntryA","arrWfEntryB","arrWfEntryC",
  "arrWfAMcp","arrWfBMcp","arrWfCMcp",
  "arrWfAAnalyze","arrWfBAnalyze","arrWfCAnalyze",
  "arrWfAnalyzeGenerate","arrWfGenerateWrite",
];

const stages = [
  // ── 0. Concept ──
  {
    title: "0. 개념: Skill / Agent / Task",
    message: "Skill은 레시피, Agent는 셰프, Task는 주문 전표 — 세 개념의 차이를 먼저 이해합니다.",
    fog: { fogConceptNodes: 0 },
    show: ["nodeConceptSkill","nodeConceptAgent","nodeConceptTask"],
    showArrows: [],
    animatedArrows: [],
    flowLabels: [],
  },
  // ── 1. Single Agent ──
  {
    title: "1. Agent 하나 호출",
    message: "/channel-faq Skill이 Agent를 호출합니다. Agent는 Slack MCP로 채널을 읽고, 결과를 Claude에게 돌려줍니다.",
    fog: { fogConceptNodes: 1 },
    show: ["nodeSkill1","nodeAgent1","nodeMcpSlack1","nodeToolRead1","nodeTaskDone"],
    showArrows: ["arrClaudeSkill1","arrSkill1Agent1","arrAgent1Slack","arrAgent1Read","arrAgent1Task"],
    animatedArrows: ["arrAgent1Slack","arrAgent1Read"],
    flowLabels: [],
  },
  // ── 2. Parallel Agents ──
  {
    title: "2. 여러 Agent 동시 실행",
    message: "여러 채널을 동시에 분석합니다. Agent들이 병렬로 실행되어 각자 독립적으로 Slack MCP에 접근합니다 — 하나씩 기다리는 것보다 훨씬 빠릅니다!",
    fog: { fogConceptNodes: 1 },
    show: ["nodeSkill2","parallelBracket","nodeAgent2a","nodeAgent2b","nodeAgent2c","nodeMcp2a","nodeMcp2b","nodeMcp2c","nodeMerge2"],
    showArrows: ["arrClaudeSkill2","arrSkill2AgentA","arrSkill2AgentB","arrSkill2AgentC","arrAgent2aMcp","arrAgent2bMcp","arrAgent2cMcp","arrAgent2aMerge","arrAgent2bMerge","arrAgent2cMerge"],
    animatedArrows: ["arrAgent2aMcp","arrAgent2bMcp","arrAgent2cMcp"],
    flowLabels: [],
  },
  // ── 3. AI 워크플로우 파이프라인 ──
  {
    title: "3. 수집 → 분석 → 생성 파이프라인",
    message: "수집은 병렬로, 분석과 생성은 순차로 — AI가 작업 간 의존성을 파악해 최적 순서로 실행합니다.",
    fog: { fogConceptNodes: 1 },
    show: ["orchContainer3","nodeWf2a","nodeWf2b","nodeWf2c","nodeWfAnalyze","nodeWfGenerate","nodeWfMcpA","nodeWfMcpB","nodeWfMcpC","nodeWfWrite"],
    showArrows: ["arrWfClaudeEntry","arrWfEntryA","arrWfEntryB","arrWfEntryC","arrWfAMcp","arrWfBMcp","arrWfCMcp","arrWfAAnalyze","arrWfBAnalyze","arrWfCAnalyze","arrWfAnalyzeGenerate","arrWfGenerateWrite"],
    animatedArrows: ["arrWfAMcp","arrWfBMcp","arrWfCMcp","arrWfAnalyzeGenerate"],
    flowLabels: ["lblCollectAnalyze","lblAnalyzeGenerate"],
  },
];

let current = 0;
let prevIdx = -1;

function applyStage(idx) {
  const s = stages[idx];

  document.getElementById("stageLabel").textContent = s.title;
  document.getElementById("messageBar").textContent = s.message;

  // Fog layers
  for (const [id, opacity] of Object.entries(s.fog)) {
    const el = document.getElementById(id);
    if (el) el.style.opacity = opacity;
  }

  // Get nodes to hide (were visible, now should not be)
  const toHide = allNodes.filter(id => !s.show.includes(id));
  const toShow = s.show;

  // Exit: stagger hide
  toHide.forEach((id, i) => {
    const el = document.getElementById(id);
    if (!el || el.style.opacity === "0") return;
    setTimeout(() => {
      el.style.opacity = "0";
      el.style.transform = "translateX(0)";
      setTimeout(() => { el.style.visibility = "hidden"; }, 400);
    }, i * 20);
  });

  const exitDuration = Math.min(toHide.length * 20 + 60, 160);

  // Enter: stagger show after exit (with fog delay for stage 0 concept nodes)
  const conceptNodeIds = ["nodeConceptSkill","nodeConceptAgent","nodeConceptTask"];
  const fogDelay = (idx === 0) ? 400 : 0;

  toShow.forEach((id, i) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.visibility = "visible";
    el.style.transform = "translateX(8px)";
    const isConcept = conceptNodeIds.includes(id);
    const delay = exitDuration + (isConcept ? fogDelay : 0) + i * 50;
    setTimeout(() => {
      el.style.opacity = "1";
      el.style.transform = "translateX(0)";
    }, delay);
  });

  // Arrows and flow labels — reset immediately
  allArrows.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.style.opacity = "0";
      el.classList.remove("animated");
    }
  });
  ["lblCollectAnalyze","lblAnalyzeGenerate"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.opacity = "0";
  });

  s.showArrows.forEach((id, i) => {
    const el = document.getElementById(id);
    if (!el) return;
    setTimeout(() => {
      el.style.opacity = "1";
      if (s.animatedArrows && s.animatedArrows.includes(id)) {
        el.classList.add("animated");
      }
    }, exitDuration + 180 + i * 55);
  });

  if (s.flowLabels) {
    s.flowLabels.forEach((id, i) => {
      const el = document.getElementById(id);
      if (el) setTimeout(() => { el.style.opacity = "1"; }, exitDuration + 500 + i * 80);
    });
  }

  // Stage nav buttons
  document.querySelectorAll(".stage-btn").forEach((btn, i) => {
    btn.classList.toggle("active", i === idx);
  });

  // Progress fill bar
  const fillEl = document.querySelector(".progress-fill");
  if (fillEl) {
    const pct = stages.length <= 1 ? 100 : (idx / (stages.length - 1)) * 100;
    fillEl.style.width = pct + "%";
  }

  // Progress dot indicators
  document.querySelectorAll(".progress-dot").forEach((dot, i) => {
    dot.classList.toggle("active", i === idx);
    dot.classList.toggle("reached", i < idx);
  });

  document.getElementById("btnPrev").disabled = idx === 0;
  const isLast = idx === stages.length - 1;
  document.getElementById("btnNext").disabled = isLast;
  document.getElementById("btnNext").textContent = isLast ? "완료! 🎉" : "다음 →";

  // Restart button
  const existingRestart = document.getElementById("btnRestart");
  if (isLast) {
    if (!existingRestart) {
      const btnRestart = document.createElement("button");
      btnRestart.id = "btnRestart";
      btnRestart.className = "nav-btn";
      btnRestart.textContent = "↺ 처음으로";
      btnRestart.addEventListener("click", () => {
        current = 0;
        applyStage(0);
      });
      document.getElementById("navBtns").appendChild(btnRestart);
    }
  } else {
    if (existingRestart) existingRestart.remove();
  }

  prevIdx = idx;
}

// Build stage nav buttons
const navLabels = ["0. 개념 이해","1. Agent 1개","2. 병렬 Agent","3. AI 워크플로우"];
const nav = document.getElementById("stageNav");
navLabels.forEach((label, i) => {
  const btn = document.createElement("button");
  btn.className = "stage-btn";
  btn.textContent = label;
  btn.addEventListener("click", () => { current = i; applyStage(i); });
  nav.appendChild(btn);
});

// Build progress fill bar
const pb = document.getElementById("progressBar");
const fill = document.createElement("div");
fill.className = "progress-fill";
pb.appendChild(fill);

// Add stage dots
stages.forEach((_, i) => {
  const dot = document.createElement("div");
  dot.className = "progress-dot";
  dot.style.left = (i / (stages.length - 1) * 100) + "%";
  dot.addEventListener("click", () => { current = i; applyStage(i); });
  pb.appendChild(dot);
});

// Navigation buttons
document.getElementById("btnPrev").addEventListener("click", () => {
  if (current > 0) { current--; applyStage(current); }
});
document.getElementById("btnNext").addEventListener("click", () => {
  if (current < stages.length - 1) { current++; applyStage(current); }
});

// Keyboard navigation
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === "ArrowDown") {
    if (current < stages.length - 1) { current++; applyStage(current); }
  } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
    if (current > 0) { current--; applyStage(current); }
  }
});

// Node hover → highlight connected arrows
function setupNodeHover() {
  const nodeArrowMap = {
    "nodeAgent1": ["arrClaudeSkill1","arrSkill1Agent1","arrAgent1Slack","arrAgent1Read","arrAgent1Task"],
    "nodeAgent2a": ["arrSkill2AgentA","arrAgent2aMcp","arrAgent2aMerge"],
    "nodeAgent2b": ["arrSkill2AgentB","arrAgent2bMcp","arrAgent2bMerge"],
    "nodeAgent2c": ["arrSkill2AgentC","arrAgent2cMcp","arrAgent2cMerge"],
    "nodeWfAnalyze": ["arrWfAAnalyze","arrWfBAnalyze","arrWfCAnalyze","arrWfAnalyzeGenerate"],
    "nodeWfGenerate": ["arrWfAnalyzeGenerate","arrWfGenerateWrite"],
    "nodeWf2a": ["arrWfEntryA","arrWfAMcp","arrWfAAnalyze"],
    "nodeWf2b": ["arrWfEntryB","arrWfBMcp","arrWfBAnalyze"],
    "nodeWf2c": ["arrWfEntryC","arrWfCMcp","arrWfCAnalyze"],
  };

  Object.entries(nodeArrowMap).forEach(([nodeId, arrowIds]) => {
    const node = document.getElementById(nodeId);
    if (!node) return;
    node.style.cursor = "pointer";
    node.addEventListener("mouseenter", () => {
      arrowIds.forEach(id => {
        const el = document.getElementById(id);
        if (el && el.style.opacity !== "0") {
          el.style.strokeWidth = "4";
          el.style.filter = "drop-shadow(0 0 4px currentColor)";
        }
      });
    });
    node.addEventListener("mouseleave", () => {
      arrowIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.style.strokeWidth = "";
          el.style.filter = "";
        }
      });
    });
  });
}

setupNodeHover();
applyStage(0);
</script>
