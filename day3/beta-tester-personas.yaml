# ┌─────────────────────────────────────────────────────────┐
# │  tech_literacy    : low ── medium_low ── medium ── high ── very_high  │
# │  persona-2(박지호) ·  persona-5(정민수) · persona-4(최은비) · persona-1(김서연) · persona-3(이준혁)  │
# │                                                         │
# │  claude_proficiency: beginner ──────── intermediate ──── advanced     │
