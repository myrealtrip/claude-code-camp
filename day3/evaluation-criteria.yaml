# Claude Code Camp — 교육 Skill 평가 기준
# 용도: 평가 스킬이 베타테스터(team agent teammate)의 conversation history를 분석할 때 사용
# 평가 단위: 단일 페르소나 기준 (페르소나 간 비교 아님)
# 점수 체계: 모든 기준 1-10 스펙트럼

metadata:
  version: "1.0"
  score_range:
    min: 1
    max: 10
  evaluation_scope: single_persona
  input: conversation_history  # claude -p --verbose --resume 으로 수집된 멀티턴 대화 이력
  output: per_criterion_score_with_evidence  # 기준별 점수 + 근거 + 종합 리포트

dimensions:
  - id: learner_experience
    name: 학습자 경험
    description: 교육을 받는 사람이 따라가기 좋은 경험이었는가
    weight: 0.40
    criteria:
      - id: learning_overview
        name: 학습 내용 미리보기
        weight: 0.15
        guideline: |
          강의 시작 시 오늘 무엇을 배울지 전체 개요를 제공하는가.
          - 1-3: 개요 없이 바로 첫 섹션으로 진입. 학습자가 전체 구조를 파악할 수 없어
                  지금 어디쯤인지, 앞으로 뭘 배울지 감을 잡지 못함.
          - 4-6: 섹션 목록은 나열하지만 각 섹션에서 무엇을 얻게 되는지 설명이 부족.
                  "섹션 1, 섹션 2, 섹션 3이 있습니다" 수준.
          - 7-9: 전체 학습 여정을 명확히 안내. 각 섹션의 핵심 내용과 최종 결과물을 미리 제시.
                  학습자가 "오늘 이런 걸 배우는구나"를 사전에 파악할 수 있음.
          - 10: 학습 로드맵이 기대감을 유발. 각 섹션의 연결 관계와 최종 목표까지 제시하여
                  학습자가 능동적으로 참여할 동기를 갖게 됨.

      - id: difficulty_fit
        name: 난이도 적절성
        weight: 0.20
        guideline: |
          페르소나의 tech_literacy와 claude_code_proficiency 수준에 맞는 설명을 제공했는가.
          - 1-3: 페르소나 수준과 심각하게 불일치. 비개발자에게 기술 용어를 설명 없이 사용하거나,
                  고급 사용자에게 이미 아는 내용을 장황하게 설명.
          - 4-6: 대체로 맞지만 일부 구간에서 수준 불일치가 발생. 비유나 예시가 부족하거나,
                  불필요한 설명이 섞여 있음.
          - 7-9: 페르소나 수준에 잘 맞춤. 비개발자에게는 비유를 활용하고,
                  개발자에게는 기술적 맥락을 제공. 적응적 설명.
          - 10: 페르소나별 최적화가 완벽. 설명 깊이, 용어, 예시 모두 타겟에 정확히 맞음.

      - id: flow_and_pacing
        name: 흐름과 페이싱
        weight: 0.15
        guideline: |
          섹션 간 전환이 매끄럽고, 진행 속도가 적절한가.
          - 1-3: 섹션 전환이 갑작스럽거나 맥락 없이 넘어감. 한 섹션이 지나치게 길거나 짧음.
                  camp-section-transition 패턴이 제대로 작동하지 않음.
          - 4-6: 전환은 있지만 기계적. 이전 섹션과 다음 섹션의 연결 고리가 약함.
                  시간 안내가 부정확하거나 누락.
          - 7-9: 자연스러운 전환. "방금 배운 X를 바탕으로 이제 Y를 해봅시다" 식의 연결.
                  남은 시간 안내가 정확하고 페이싱이 적절.
          - 10: 스토리텔링처럼 자연스러운 흐름. 학습자가 지루함이나 급박함을 느끼지 않음.

      - id: interaction_quality
        name: 상호작용 품질
        weight: 0.20
        guideline: |
          AskUserQuestion 활용이 적절하고, 선택지가 명확한가.
          - 1-3: 상호작용이 거의 없거나, 선택지가 모호하여 어떤 것을 골라야 할지 알 수 없음.
                  일방적 강의 형태.
          - 4-6: 상호작용은 있지만 형식적. 선택지가 있어도 실질적 차이가 없거나,
                  사용자 응답이 이후 진행에 반영되지 않음.
          - 7-9: 선택지가 명확하고 각각의 의미가 구분됨. 사용자 응답에 따라 진행이 달라짐.
                  질문 타이밍이 적절.
          - 10: 대화형 학습의 모범. 학습자가 능동적으로 참여하고 있다는 느낌을 받음.

      - id: real_world_relevance
        name: 실무 연관성
        weight: 0.15
        guideline: |
          실습 예제가 학습자의 실제 업무 워크플로우와 가까워서 와닿는가.
          - 1-3: 예제가 추상적이거나 인위적. "Hello World" 수준의 예제로
                  실제 업무에서 어떻게 쓸지 연결이 안 됨. 학습자가 "이걸 왜 하지?" 느낌.
          - 4-6: 예제가 그럴듯하지만 학습자의 실제 업무와 거리가 있음.
                  개발자에게 마케팅 예제를 주거나, PM에게 코드 디버깅 예제를 주는 식.
          - 7-9: 예제가 학습자 또는 주변 동료의 일상 워크플로우와 유사.
                  "아, 우리 팀에서도 이런 상황 있었는데" 하는 공감대가 형성됨.
                  페르소나의 role과 interests를 반영한 시나리오 선택.
          - 10: 학습자가 "이거 바로 내일 써먹어야겠다"고 느끼는 수준.
                  실습 결과물이 곧바로 실무에 적용 가능하거나, 동료에게 공유하고 싶어지는 예제.

      - id: stuck_recovery
        name: 막힘 시 대응
        weight: 0.15
        guideline: |
          베타테스터가 막히거나 혼란스러워할 때 적절한 도움을 제공하는가.
          - 1-3: 막힌 상황을 인식하지 못하거나, 같은 설명을 반복하기만 함.
                  에러 발생 시 다음 단계로 넘어가지 못하고 멈춤.
          - 4-6: 막힘을 인식하지만 도움이 피상적. "다시 시도해보세요" 수준의 안내.
          - 7-9: 막힌 원인을 파악하고 대안을 제시. 다른 설명 방식이나 우회 경로를 안내.
                  "질문이 있어요" 선택 시 충실하게 대응.
          - 10: 선제적으로 막힐 수 있는 지점을 예측하고 사전 안내.
                  막혔을 때 학습자의 자존감을 해치지 않으면서 효과적으로 해결.

  - id: goal_achievement
    name: 교육 목표 달성
    description: 강의가 의도한 학습 목표를 실제로 달성했는가
    weight: 0.35
    criteria:
      - id: agent_task_skill_distinction
        name: Agent, Task, Skill 개념 구분
        weight: 0.25
        guideline: |
          학습자가 Agent, Task, Skill 세 가지 개념의 차이를 명확히 이해했는가.
          세 개념의 비교 축:

          [정체 — 이것은 무엇인가]
          - Agent: 독립 컨텍스트 윈도우를 가진 실행자. 자율적으로 도구를 선택하고 판단.
            (.claude/agents/*.md 파일로 정의)
          - Task: 내장 진행 추적 도구. TaskCreate/TaskUpdate로 체크리스트와 상태를 관리.
            (파일 정의 없이 내장 도구로 동작)
          - Skill: 재사용 가능한 프롬프트 패키지.
            (SKILL.md 마크다운 파일로 정의, slash command로 호출 또는 Claude가 맥락상 자동 호출)

          [컨텍스트 — 대화 맥락을 공유하는가]
          - Agent: 별도 컨텍스트 윈도우에서 실행, 완료 시 요약만 반환
          - Task: 메인 대화 내에서 동작 (상태 메타데이터만 차지)
          - Skill: 메인 대화에 인라인으로 주입 (대화에 직접 합류)

          [병렬성]
          - Agent: 가능 (run_in_background, isolation: worktree)
          - Task: 자체 병렬 기능 없음. Agent에 위임하여 병렬 처리 시 Task로 추적 가능
          - Skill: 불가 (메인 스레드에서 순차 실행)

          [조합 방향 — 누가 누구를 호출하는가]
          - Skill → Task: Skill 워크플로우 안에서 TaskCreate로 단계별 진행 추적
          - Skill → Agent: Skill에서 context: fork 설정 시 격리된 Agent로 실행
          - Agent → Skill: Agent 정의 시 skills: 필드로 Skill 지침을 사전 로드
          - Agent → Task: Agent가 복잡한 작업 수행 시 TaskCreate로 진행 추적
          - Task는 항상 "안에서 호출되는 쪽" (Task가 무언가를 호출하지 않음)

          [핵심 프레임]
          - 무엇을 추적할지 = Task (진행 상태 + 의존성)
          - 어떻게 할지 = Skill (절차 정의 + 재사용)
          - 누가 할지 = Agent (독립 실행 + 격리)

          - 1-3: 세 개념을 혼동하거나 구분하지 못함. Agent와 Skill을 같은 것으로 취급하거나,
                  Task의 역할을 설명하지 않고 넘어감.
          - 4-6: 일부 차이를 언급하지만 피상적. "Agent는 자동, Skill은 수동, Task는 목록" 같은
                  불정확한 설명. 비교 축(컨텍스트, 병렬성, 조합 방향)이 누락되어
                  학습자가 상황에 맞는 선택을 할 수 없는 수준.
          - 7-9: 비교 축을 활용한 명확한 구분 제시. 특히 조합 방향(누가 누구를 호출하는가)과
                  컨텍스트 격리 여부를 구체적 예시와 함께 설명.
                  학습자가 "이 상황에는 Agent, 저 상황에는 Skill, 진행 관리는 Task"를 판단 가능.
          - 10: 비유나 실습을 통해 체감 수준의 이해 달성. 학습자가 스스로 세 개념을
                  조합하여 활용하는 시나리오를 구상할 수 있음.
                  예: "Skill 안에서 워크플로우를 정의하고, context: fork로 Agent에 위임하며,
                  Agent 안에서 Task로 진행률을 추적한다"

      - id: learning_objective_completion
        name: 학습 목표 달성도
        weight: 0.30
        guideline: |
          각 섹션의 명시된 학습 목표를 실제로 달성했는가.
          SKILL.md의 각 섹션 "목표"와 대화 이력을 대조하여 판단.
          - 1-3: 절반 이상의 섹션 목표를 달성하지 못함. 핵심 개념 설명이 누락되거나
                  실습이 완료되지 않은 채 넘어감.
          - 4-6: 대부분의 섹션을 진행했지만 일부 목표가 피상적으로만 달성.
                  개념은 언급했으나 학습자가 실제로 이해했는지 확인하지 않음.
          - 7-9: 모든 섹션 목표를 달성. 퀴즈나 실습을 통해 이해도를 확인.
                  학습자가 배운 내용을 자기 맥락에 적용할 수 있는 수준.
          - 10: 목표를 넘어서는 학습이 발생. 학습자가 스스로 응용 아이디어를 내거나
                  추가 질문을 통해 심화 학습이 이루어짐.

      - id: quiz_quality
        name: 퀴즈 품질
        weight: 0.225
        guideline: |
          퀴즈가 모호하지 않고, 핵심 개념을 정확히 짚어내는가.
          camp-quiz 패턴의 실제 실행 품질을 평가.
          - 1-3: 퀴즈 문제가 모호하여 정답이 여러 개로 해석 가능.
                  오답 해설이 없거나 부정확. 퀴즈가 핵심과 무관한 지엽적 내용을 묻는다.
          - 4-6: 퀴즈가 핵심을 묻지만 선택지 간 구분이 명확하지 않은 경우가 있음.
                  해설은 있지만 "왜" 그 답인지 설명이 부족.
          - 7-9: 문제가 명확하고 선택지가 뚜렷이 구분됨. 정답/오답 해설이 충실.
                  퀴즈가 학습 내용의 핵심을 정확히 검증.
          - 10: 퀴즈 자체가 학습 경험. 틀려도 해설을 통해 더 깊이 이해하게 됨.
                  난이도가 섹션 내용에 비례하여 적절히 조절됨.

      - id: hands_on_effectiveness
        name: 실습 효과
        weight: 0.225
        guideline: |
          실습이 실제로 결과물을 만들어내고, 학습에 기여하는가.
          - 1-3: 실습이 없거나, 있어도 "이 명령어를 복사해서 붙여넣으세요" 수준.
                  결과물이 나오지 않거나 학습과 연결되지 않음.
          - 4-6: 실습이 있고 결과물도 나오지만, 학습자가 "왜" 이걸 하는지 이해하지 못함.
                  단순 따라하기 수준.
          - 7-9: 실습이 명확한 목적과 함께 제시됨. 결과물이 눈에 보이고,
                  학습자가 "아, 이래서 이걸 하는구나"를 느낌. 실패 시 디버깅 안내 포함.
          - 10: 실습 결과물이 학습자의 실제 업무에 바로 활용 가능한 수준.
                  실습 과정 자체가 개념 이해를 강화하는 설계.

  - id: technical_quality
    name: 기술적 품질
    description: Skill의 기술적 구현이 견고하고 일관적인가
    weight: 0.25
    criteria:
      - id: error_handling
        name: 에러 처리
        weight: 0.50
        guideline: |
          예외 상황에서 Skill이 깨지지 않고 적절히 대응하는가.
          - 1-3: 예상치 못한 입력이나 환경 차이에서 Skill이 멈추거나 의미 없는 에러 출력.
                  복구 경로가 없어 학습자가 처음부터 다시 시작해야 함.
          - 4-6: 일부 에러는 처리하지만, edge case에서 취약.
                  에러 메시지가 기술적이어서 비개발자가 이해하기 어려움.
          - 7-9: 주요 에러 시나리오를 처리. 사용자 친화적 에러 메시지 제공.
                  에러 발생 후에도 다음 단계로 진행 가능한 대안 제시.
          - 10: 방어적 설계. 잘못된 환경, 누락된 도구, 네트워크 문제 등
                  다양한 실패 시나리오에서도 우아하게 대응하고 학습 흐름을 유지.

      - id: prompt_quality
        name: 프롬프트 품질
        weight: 0.50
        guideline: |
          SKILL.md의 지시문이 명확하고 일관적이어서 Claude가 의도대로 동작하는가.
          - 1-3: 지시문이 모호하여 Claude가 의도와 다르게 동작하는 경우가 빈번.
                  섹션 간 톤이나 스타일이 불일치. 공통 패턴(camp-quiz 등) 호출이 누락.
          - 4-6: 대체로 의도대로 동작하지만, 일부 지시문이 해석의 여지가 있음.
                  반복적인 패턴이 통일되지 않음.
          - 7-9: 지시문이 명확하고 Claude가 일관되게 동작. 공통 패턴을 적절히 활용.
                  톤, 스타일, 형식이 전체적으로 통일됨.
          - 10: 프롬프트 엔지니어링의 모범. 지시문만 읽어도 강의가 어떻게 진행될지
                  정확히 예측 가능. 예외 케이스까지 프롬프트에서 명시적으로 처리.
