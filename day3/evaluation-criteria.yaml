# Claude Code Camp — 교육 Skill 평가 기준
# 용도: LLM-as-Judge가 페르소나별 대화 이력을 분석할 때 사용
# 평가 단위: 단일 페르소나 기준 (페르소나 간 비교 아님)
# 점수 체계: 1-10 스펙트럼. 각 구간 설명을 기준으로 가장 가까운 점수 부여.

metadata:
  version: "1.1"
  score_range:
    min: 1
    max: 10
  evaluation_scope: single_persona
  input: conversation_history  # claude -p --output-format stream-json으로 수집된 멀티턴 대화 이력
  output: per_criterion_score_with_evidence  # 기준별 점수 + 근거(대화에서 인용) + 개선 제안

dimensions:
  - id: learner_experience
    name: 학습자 경험
    description: 교육을 받는 사람이 따라가기 좋은 경험이었는가
    weight: 0.40
    # 하위 criteria 가중치 합계: 1.00
    criteria:
      - id: learning_overview
        name: 학습 내용 미리보기
        weight: 0.15
        guideline: |
          강의 시작 시 오늘 무엇을 배울지 전체 개요를 제공하는가.
          - 1-3: 개요 없이 바로 첫 섹션으로 진입. 학습자가 전체 구조를 파악할 수 없음.
          - 4-6: 섹션 목록만 나열. "섹션 1, 2, 3이 있습니다" 수준으로 각 섹션에서 얻을 것이 불명확.
          - 7-9: 각 섹션의 핵심 내용과 최종 결과물을 미리 제시. 학습자가 전체 여정을 사전에 파악.
          - 10: 섹션 간 연결 관계와 최종 목표까지 제시하여 학습자가 능동적 참여 동기를 가짐.

      - id: difficulty_fit
        name: 난이도 적절성
        weight: 0.20
        guideline: |
          페르소나의 tech_literacy와 claude_code_proficiency 수준에 맞는 설명을 제공했는가.
          평가 시 페르소나 프로필의 해당 필드를 참고하여 실제 설명과 비교한다.
          - 1-3: 수준과 심각하게 불일치. 비개발자에게 기술 용어를 설명 없이 사용하거나,
                  고급 사용자에게 이미 아는 내용을 반복.
          - 4-6: 대체로 맞지만 일부 구간에서 불일치. 비유나 예시가 부족하거나 불필요한 설명이 섞임.
          - 7-9: 수준에 잘 맞음. 비개발자에게는 비유 활용, 개발자에게는 기술적 맥락 제공.
          - 10: 설명 깊이, 용어, 예시 모두 해당 페르소나에 정확히 최적화됨.

      - id: flow_and_pacing
        name: 흐름과 페이싱
        weight: 0.10
        guideline: |
          섹션 간 전환이 매끄럽고, 진행 속도가 적절한가.
          - 1-3: 섹션 전환이 갑작스럽거나 맥락 없이 넘어감. 남은 시간 안내 누락.
          - 4-6: 전환은 있지만 기계적. "다음 섹션으로 가겠습니다" 수준으로 이전-다음 연결 고리 약함.
          - 7-9: "방금 배운 X를 바탕으로 이제 Y를 해봅시다" 식의 연결. 남은 시간 안내 정확.
          - 10: 스토리텔링처럼 자연스러운 흐름. 학습자가 지루함이나 급박함을 느끼지 않음.

      - id: response_length
        name: 응답 길이 적절성
        weight: 0.05
        guideline: |
          한 턴의 응답이 적절한 분량으로 끊어서 전달되는가.
          판단 기준: 텍스트 응답에서 마크다운 헤더/표/코드블록을 포함한 전체 줄 수.
          - 1-3: 여러 턴에서 40줄 이상의 연속 설명. 상호작용 없이 일방적으로 내용을 쏟아냄.
          - 4-6: 일부 턴에서 40줄 초과. 끊으려는 시도는 보이지만 일관적이지 않음.
          - 7-9: 대부분의 응답이 30줄 이내. AskUserQuestion이나 실습 안내로 호흡을 맞춤.
          - 10: 모든 응답이 적절한 분량. 개념-예시-상호작용이 균형 있게 배치됨.

      - id: interaction_quality
        name: 상호작용 품질
        weight: 0.20
        guideline: |
          AskUserQuestion 활용이 적절하고, 사용자 응답이 이후 진행에 실제로 반영되는가.
          - 1-3: 상호작용이 거의 없거나, 선택지가 모호. 일방적 강의 형태.
          - 4-6: 상호작용은 있지만 형식적. 어떤 선택을 해도 같은 진행으로 이어짐.
          - 7-9: 선택지가 명확하고 응답에 따라 진행이 실제로 달라짐. 질문 타이밍이 적절.
          - 10: 학습자가 능동적으로 참여하는 느낌. 응답 내용이 이후 설명 방식에도 반영됨.

      - id: real_world_relevance
        name: 실무 연관성
        weight: 0.15
        guideline: |
          실습 예제가 해당 페르소나의 실제 업무 워크플로우와 가까워서 와닿는가.
          평가 시 페르소나의 role, current_pain_points, day2_result를 참고한다.
          - 1-3: 예제가 추상적이거나 페르소나의 업무와 무관. "이걸 왜 하지?" 느낌.
          - 4-6: 예제가 그럴듯하지만 해당 페르소나의 실제 업무와 거리가 있음.
          - 7-9: "아, 우리 팀에서도 이런 상황 있었는데" 하는 공감대가 형성됨.
          - 10: "이거 바로 내일 써먹어야겠다"고 느끼는 수준. 결과물이 즉시 실무에 적용 가능.

      - id: stuck_recovery
        name: 막힘 시 대응
        weight: 0.15
        guideline: |
          페르소나가 혼란스럽거나 이해를 못한 신호를 보낼 때 적절히 대응하는가.
          "막힘 신호"의 예: 재질문, 이해 못했다는 응답, 엉뚱한 답변, "잘 모르겠어요" 선택.
          E2E 시뮬레이션에서 막힘 신호가 없었다면 "예방적 설명"이나 "선제적 체크"로 판단.
          - 1-3: 막힘 신호를 인식 못하거나, 같은 설명을 반복.
          - 4-6: 막힘을 인식하지만 대응이 피상적. "다시 시도해보세요" 수준.
          - 7-9: 막힌 원인을 파악하고 다른 설명 방식이나 우회 경로 제시.
          - 10: 막힐 수 있는 지점을 사전 예측하여 안내. 자존감을 해치지 않으면서 효과적으로 해결.

  - id: goal_achievement
    name: 교육 목표 달성
    description: 강의가 의도한 학습 목표를 실제로 달성했는가
    weight: 0.35
    # 하위 criteria 가중치 합계: 1.00
    criteria:
      - id: agent_task_skill_distinction
        name: Agent, Task, Skill 개념 구분
        weight: 0.20
        guideline: |
          학습자가 세 개념의 차이를 실제로 이해했는가.

          # 평가자를 위한 정답 레퍼런스
          정체:
            Agent: 독립 컨텍스트에서 실행되는 자율 실행자 (.claude/agents/*.md 또는 Agent tool로 호출)
            Task:  진행 상황 추적 내장 도구 (TaskCreate/TaskUpdate, 파일 정의 없음)
            Skill: 재사용 가능한 프롬프트 패키지 (SKILL.md, slash command로 호출)
          컨텍스트:
            Agent: 별도 컨텍스트 윈도우, 완료 시 요약만 반환
            Task:  메인 대화 내 상태 메타데이터
            Skill: 메인 대화에 인라인 주입
          병렬 실행:
            Agent: 가능 (run_in_background: true, isolation: "worktree")
            Task:  자체 불가, Agent에 위임
            Skill: 불가 (순차 실행)
          호출 방향:
            Skill → Agent, Skill → Task, Agent → Task (Task는 항상 호출되는 쪽)

          # 점수 기준
          - 1-3: 세 개념을 혼동. Agent와 Skill을 같은 것으로 취급하거나 Task를 누락.
          - 4-6: 일부 차이를 언급하지만 피상적. 컨텍스트 격리나 병렬성 차이가 빠짐.
          - 7-9: 비교 축(컨텍스트, 병렬성, 호출 방향)을 구체적 예시와 함께 설명.
                  학습자가 "이 상황에는 뭘 쓸지" 판단할 수 있는 수준.
          - 10: 비유나 실습을 통해 체감 이해. 학습자가 세 개념을 조합한 시나리오를 스스로 구상.

      - id: learning_objective_completion
        name: 학습 목표 달성도
        weight: 0.25
        guideline: |
          각 섹션의 명시된 학습 목표를 실제로 달성했는가.
          평가 방법: SKILL.md 각 섹션의 "목표" 항목과 대화 이력을 항목별로 대조.
          Day 3의 4개 핵심 목표: (1)개념 구분, (2)Agent 생성+실행, (3)병렬 실행 체험, (4)워크플로우 완성.
          - 1-3: 핵심 목표 절반 이상 미달. 개념 설명이 누락되거나 실습이 완료되지 않은 채 넘어감.
          - 4-6: 대부분 진행했지만 이해 확인 없이 넘어감. 개념은 언급했으나 체화 여부 불명확.
          - 7-9: 4개 핵심 목표 모두 달성. 퀴즈나 실습으로 이해도 확인.
          - 10: 목표를 넘어서는 학습 발생. 학습자가 스스로 응용 아이디어를 제시하거나 심화 질문.

      - id: quiz_quality
        name: 퀴즈 품질
        weight: 0.20
        guideline: |
          퀴즈가 핵심 개념을 정확히 짚어내고, 해설이 이해를 강화하는가.
          - 1-3: 문제가 모호하여 정답이 여러 개로 해석 가능. 해설 없거나 부정확.
          - 4-6: 핵심을 묻지만 선택지 간 구분이 불명확. 해설이 "맞습니다" 수준으로 빈약.
          - 7-9: 문제와 선택지가 명확히 구분됨. 정답/오답 해설이 "왜 그런지"까지 설명.
          - 10: 틀렸을 때 해설로 더 깊이 이해하게 됨. 난이도가 섹션 내용에 비례.

      - id: agent_tool_understanding
        name: Agent tool 이해도
        weight: 0.15
        guideline: |
          Agent tool의 핵심 파라미터와 동작 방식을 실제 사용 가능한 수준으로 안내하는가.
          Day 3에서 다루는 Agent tool 핵심 파라미터:
            prompt (업무 지시서), subagent_type (built-in 유형), model (haiku/sonnet/opus),
            run_in_background (병렬 실행), isolation (worktree 격리)
          Custom Agent (.claude/agents/*.md)는 개념 소개 수준만 다루므로 실습 여부로 감점 없음.
          - 1-3: Agent tool을 전혀 다루지 않거나, prompt 파라미터만 언급하고 나머지 누락.
          - 4-6: 파라미터를 나열했지만 각각이 언제/왜 쓰는지 맥락 설명 부족.
          - 7-9: 핵심 파라미터의 역할과 트레이드오프(예: model 선택의 속도/비용/능력)를 설명.
                  실습에서 실제로 Agent를 호출하는 Skill을 만들어봄.
          - 10: 파라미터 조합 전략까지 설명. 학습자가 스스로 파라미터를 선택하여 Agent를 설계.

      - id: hands_on_effectiveness
        name: 실습 효과
        weight: 0.20
        guideline: |
          실습이 실제 결과물을 만들어내고, "왜 이걸 하는지"가 전달되는가.
          Day 3 실습의 기대 결과물: channel-faq/SKILL.md (섹션 2→3→4 누적 완성).
          - 1-3: 실습 없거나 "이 명령어를 복사하세요" 수준. 결과물 없거나 학습과 미연결.
          - 4-6: 결과물은 나오지만 학습자가 "왜" 하는지 이해 못함. 단순 따라하기.
          - 7-9: 실습 목적이 명확히 제시됨. 결과물이 눈에 보이고, 실패 시 디버깅 안내 포함.
          - 10: 결과물이 학습자의 실무에 즉시 활용 가능. 실습 과정 자체가 개념 이해를 강화.

  - id: technical_quality
    name: 기술적 품질
    description: Skill의 기술적 구현이 견고하고 일관적인가
    weight: 0.25
    # 하위 criteria 가중치 합계: 1.00
    criteria:
      - id: error_handling
        name: 에러 처리
        weight: 0.50
        guideline: |
          예외 상황에서 Skill이 깨지지 않고 학습 흐름을 유지하는가.
          평가 가능한 에러 상황의 예: 잘못된 OS, Slack MCP 미연결, 파일 생성 실패, 실습 도중 에러.
          - 1-3: 예외 상황에서 Skill이 멈추거나 무의미한 에러 출력. 복구 경로 없음.
          - 4-6: 일부 에러는 처리하나 edge case에서 취약. 에러 메시지가 비개발자에게 불친절.
          - 7-9: 주요 에러 시나리오를 처리. 에러 후에도 대안을 제시하고 진행 가능.
          - 10: 다양한 실패 시나리오(누락된 도구, 환경 차이 등)에서 우아하게 대응.

      - id: prompt_quality
        name: 프롬프트 품질
        weight: 0.50
        guideline: |
          SKILL.md의 지시문이 명확하여 Claude가 의도대로 일관되게 동작하는가.
          - 1-3: 지시문이 모호하여 Claude가 의도와 다르게 동작하는 경우 빈번.
                  섹션 간 톤/스타일 불일치. 공통 패턴(camp-quiz 등) 호출 누락.
          - 4-6: 대체로 의도대로 동작하나 일부 지시문이 해석의 여지가 있음.
                  반복 패턴이 통일되지 않음.
          - 7-9: 지시문이 명확하고 Claude가 일관되게 동작. 공통 패턴을 적절히 활용.
                  톤, 스타일, 형식이 전체적으로 통일됨.
          - 10: 지시문만 읽어도 강의 진행 방식이 정확히 예측 가능. 예외 케이스도 명시적으로 처리.
